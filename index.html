<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Hatch — First Night Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #0D1626;
  --card: #162035;
  --card-hi: #1C2A43;
  --border: #243049;
  --teal: #3FD5C0;
  --text-1: #EEF2FF;
  --text-2: #7A8BA8;
  --text-3: #3D4F6A;
}

body {
  background: #060D1A;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text-1);
  gap: 16px;
  padding: 40px 20px;
}

.outer { display: flex; flex-direction: column; align-items: center; gap: 16px; }

/* Phone */
.phone {
  width: 390px;
  height: 844px;
  background: var(--bg);
  border-radius: 50px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 0 1.5px #1E2D4A, 0 0 0 3px #0A1020, 0 40px 100px rgba(0,0,0,0.7);
  flex-shrink: 0;
}

.pill {
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  width: 126px; height: 36px;
  background: #000;
  border-radius: 20px;
  z-index: 100;
}

.status {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 54px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 28px 8px;
  font-size: 12px;
  font-weight: 600;
  z-index: 90;
  pointer-events: none;
  background: linear-gradient(to bottom, var(--bg) 70%, transparent);
}

.content {
  position: absolute;
  top: 54px; left: 0; right: 0; bottom: 64px;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
}
.content::-webkit-scrollbar { display: none; }

/* Screen transitions */
.screen {
  position: absolute;
  top: 0; left: 0; right: 0;
  min-height: 100%;
  padding: 20px 20px 28px;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
}
.screen.slide-in  { transform: translateX(0);    opacity: 1; }
.screen.from-right{ transform: translateX(100%); opacity: 0; pointer-events: none; }
.screen.from-left { transform: translateX(-15%); opacity: 0; pointer-events: none; }
.screen.exit-left { transform: translateX(-15%); opacity: 0; pointer-events: none; }
.screen.exit-right{ transform: translateX(100%); opacity: 0; pointer-events: none; }

/* Shared UI */
.back {
  background: none; border: none;
  color: var(--text-2);
  font: 500 14px 'Inter', system-ui;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  padding: 0; margin-bottom: 16px;
  transition: color 0.15s;
}
.back:hover { color: var(--text-1); }

.progress { display: flex; gap: 5px; margin-bottom: 20px; }
.dot { height: 4px; border-radius: 2px; background: var(--border); transition: all 0.25s ease; }
.dot.fill { width: 20px; background: var(--teal); }
.dot.empty { width: 8px; }

.opts { display: flex; flex-direction: column; gap: 10px; }
.opt {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
  font: 500 15px 'Inter', system-ui;
  color: var(--text-1);
  text-align: left;
  transition: all 0.15s ease;
  width: 100%;
}
.opt:hover { background: var(--card-hi); border-color: var(--teal); transform: translateX(4px); }
.opt-ico { font-size: 22px; width: 30px; text-align: center; flex-shrink: 0; }

/* Sleep tab */
.sleep-header { padding-top: 4px; margin-bottom: 18px; }
.screen-title { font-size: 22px; font-weight: 700; }
.screen-date { font-size: 13px; color: var(--text-2); margin-top: 3px; }

.sleep-card {
  background: linear-gradient(145deg, #162E4A, #0F1E35);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 14px;
}
.sc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.sc-label { font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .08em; }
.sc-badge { background: rgba(63,213,192,.12); color: var(--teal); border: 1px solid rgba(63,213,192,.25); border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 700; }
.sc-big { font-size: 38px; font-weight: 800; line-height: 1; margin-bottom: 3px; }
.sc-sub { font-size: 12px; color: var(--text-2); margin-bottom: 14px; }
.sc-row { display: flex; border-top: 1px solid var(--border); padding-top: 12px; }
.sc-stat { flex: 1; border-left: 1px solid var(--border); padding: 0 12px; }
.sc-stat:first-child { border-left: none; padding-left: 0; }
.sc-stat-val { font-size: 14px; font-weight: 600; }
.sc-stat-lbl { font-size: 11px; color: var(--text-2); margin-top: 2px; }

.fn-card {
  background: linear-gradient(135deg, #162844, #0F1E38);
  border: 1px solid rgba(63,213,192,.2);
  border-radius: 20px;
  padding: 20px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .15s, transform .15s;
}
.fn-card:hover { border-color: rgba(63,213,192,.45); transform: translateY(-2px); }
.fn-card::after {
  content: '';
  position: absolute; top: -50px; right: -50px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, rgba(63,213,192,.12) 0%, transparent 70%);
  pointer-events: none;
}
.fn-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(63,213,192,.1); color: var(--teal);
  border-radius: 20px; padding: 3px 10px;
  font-size: 11px; font-weight: 600; margin-bottom: 10px;
}
.fn-title { font-size: 17px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
.fn-body { font-size: 13px; color: var(--text-2); line-height: 1.5; margin-bottom: 16px; }
.fn-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
.fn-opt {
  background: rgba(63,213,192,0.08);
  border: 1.5px solid rgba(63,213,192,0.2);
  border-radius: 12px;
  padding: 10px 8px;
  font: 500 13px 'Inter', system-ui;
  color: var(--text-1);
  cursor: pointer;
  text-align: center;
  transition: all .15s;
}
.fn-opt:hover { background: rgba(63,213,192,0.18); border-color: var(--teal); transform: scale(1.03); }

/* Q screens */
.q-header { padding-top: 4px; margin-bottom: 22px; }
.q-eyebrow { font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
.q-title { font-size: 22px; font-weight: 700; line-height: 1.25; margin-bottom: 8px; }
.q-subtitle { font-size: 14px; color: var(--text-2); line-height: 1.5; }

/* Branch intro */
.bi-wrap {
  border-radius: 20px; padding: 28px 20px;
  text-align: center; margin-top: 8px; margin-bottom: 20px;
}
.bi-icon { font-size: 52px; margin-bottom: 16px; }
.bi-title { font-size: 22px; font-weight: 700; line-height: 1.25; margin-bottom: 10px; }
.bi-body { font-size: 14px; color: var(--text-2); line-height: 1.6; margin-bottom: 24px; }
.bi-btn {
  border: none; border-radius: 14px;
  padding: 14px 0; font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  width: 100%; color: #091422;
  transition: opacity .15s;
}
.bi-btn:hover { opacity: .85; }

/* Recs */
.recs-header { padding-top: 4px; margin-bottom: 18px; }
.recs-title { font-size: 20px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
.recs-sub { font-size: 13px; color: var(--text-2); }

.rec {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 14px;
  display: flex; align-items: flex-start; gap: 12px;
  cursor: pointer; margin-bottom: 10px;
  transition: all .15s;
}
.rec:hover { background: var(--card-hi); transform: translateX(4px); }
.rec-ico { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.rec-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.rec-desc { font-size: 12px; color: var(--text-2); line-height: 1.4; }
.rec-arr { color: var(--text-3); font-size: 20px; align-self: center; margin-left: auto; flex-shrink: 0; }

.done-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px 20px;
  text-align: center; margin-top: 4px;
}
.done-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.done-sub { font-size: 13px; color: var(--text-2); }

/* Q2 option states */
.q2-selected { border-color: var(--teal) !important; background: rgba(63,213,192,0.1) !important; }
.q2-dimmed   { opacity: 0.35; pointer-events: none; }

/* Rec reveal */
@keyframes revealUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.rec-reveal { animation: revealUp 0.35s ease forwards; padding-top: 20px; }

/* Guide card */
.guide-card {
  border: 1px solid;
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 20px;
}
.guide-icon  { font-size: 32px; margin-bottom: 10px; }
.guide-headline { font-size: 16px; font-weight: 700; line-height: 1.35; margin-bottom: 8px; }
.guide-body  { font-size: 13px; color: var(--text-2); line-height: 1.6; }

/* Customization */
.customize-section { margin-bottom: 4px; }
.cust-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.cust-label { font-size: 12px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; margin-top: 16px; }

.btn-group { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 4px; }
.seg-btn {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 8px 13px;
  font: 500 13px 'Inter', system-ui;
  color: var(--text-2);
  cursor: pointer;
  transition: all .15s;
}
.seg-btn:hover { border-color: var(--teal); color: var(--text-1); }
.seg-btn.active { background: rgba(63,213,192,0.12); border-color: var(--teal); color: var(--text-1); font-weight: 600; }

/* Sound carousel */
.sound-scroll {
  display: flex;
  gap: 9px;
  overflow-x: auto;
  padding: 4px 0 10px;
  scrollbar-width: none;
  scroll-snap-type: x mandatory;
  margin-bottom: 4px;
}
.sound-scroll::-webkit-scrollbar { display: none; }
.sound-card {
  flex-shrink: 0;
  width: 76px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 12px 6px 10px;
  text-align: center;
  cursor: pointer;
  transition: all .15s;
  scroll-snap-align: start;
}
.sound-card:hover { background: var(--card-hi); }
.s-ico  { font-size: 22px; margin-bottom: 5px; }
.s-name { font-size: 10px; color: var(--text-2); font-weight: 500; line-height: 1.25; }
.s-wave {
  height: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  margin-top: 6px;
  opacity: 0;
  transition: opacity .2s;
}
.sound-card.playing .s-wave { opacity: 1; }
.s-wave span {
  display: inline-block;
  width: 2px;
  border-radius: 1px;
  background: currentColor;
}
.s-wave span:nth-child(1) { height: 4px;  animation: waveBar .6s .00s ease-in-out infinite alternate; }
.s-wave span:nth-child(2) { height: 9px;  animation: waveBar .6s .10s ease-in-out infinite alternate; }
.s-wave span:nth-child(3) { height: 13px; animation: waveBar .6s .20s ease-in-out infinite alternate; }
.s-wave span:nth-child(4) { height: 9px;  animation: waveBar .6s .30s ease-in-out infinite alternate; }
.s-wave span:nth-child(5) { height: 4px;  animation: waveBar .6s .40s ease-in-out infinite alternate; }
@keyframes waveBar { from { transform: scaleY(.4); } to { transform: scaleY(1); } }

/* Save button */
.save-btn {
  width: 100%;
  border: none;
  border-radius: 14px;
  padding: 15px 0;
  font: 700 16px 'Inter', system-ui;
  cursor: pointer;
  color: #091422;
  margin-top: 20px;
  transition: opacity .15s;
}
.save-btn:hover { opacity: .85; }
.save-btn:disabled { background: var(--teal) !important; cursor: default; opacity: 1; }

/* Scroll picker */
.picker-wrap {
  position: relative;
  height: 220px;
  overflow: hidden;
  border-radius: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  margin-bottom: 6px;
}
.picker-highlight {
  position: absolute;
  top: 50%; left: 12px; right: 12px;
  height: 44px;
  transform: translateY(-50%);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: rgba(63,213,192,0.07);
  pointer-events: none;
  z-index: 2;
  border-radius: 8px;
}
.picker-mask {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(to bottom, var(--card) 0%, transparent 32%, transparent 68%, var(--card) 100%);
  pointer-events: none;
  z-index: 3;
}
.picker-scroll {
  height: 100%;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
  padding: 88px 0;
}
.picker-scroll::-webkit-scrollbar { display: none; }
.picker-item {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 19px;
  font-weight: 500;
  color: var(--text-3);
  scroll-snap-align: center;
  cursor: pointer;
  transition: color .12s, font-size .12s, font-weight .12s;
  user-select: none;
}
.picker-item.selected { color: var(--text-1); font-size: 22px; font-weight: 700; }
.picker-sublabel { font-size: 13px; color: var(--text-2); padding: 8px 0 18px; }

/* Toggles */
.toggle-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 14px 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
}
.toggle-left { display: flex; align-items: flex-start; gap: 12px; flex: 1; min-width: 0; }
.toggle-ico  { font-size: 24px; flex-shrink: 0; line-height: 1; margin-top: 1px; }
.toggle-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.toggle-desc { font-size: 12px; color: var(--text-2); line-height: 1.5; }
.toggle-sw {
  width: 46px; height: 27px;
  border-radius: 14px;
  background: var(--text-3);
  position: relative;
  cursor: pointer;
  transition: background .2s;
  flex-shrink: 0;
}
.toggle-sw.on { background: var(--teal); }
.toggle-k {
  position: absolute;
  top: 3px; left: 3px;
  width: 21px; height: 21px;
  border-radius: 50%;
  background: #fff;
  transition: transform .2s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 1px 4px rgba(0,0,0,0.35);
}
.toggle-sw.on .toggle-k { transform: translateX(19px); }

/* For-you tag on chip */
.for-you-chip {
  display: inline-block;
  background: rgba(63,213,192,0.18);
  color: var(--teal);
  border-radius: 10px;
  padding: 2px 7px;
  font-size: 10px;
  font-weight: 700;
  margin-left: 5px;
  vertical-align: middle;
  letter-spacing: 0.02em;
}

/* Recommended badge overlaid on card */
.card-rec-tag {
  position: absolute;
  top: 12px; left: 12px;
  z-index: 4;
  background: rgba(10,20,35,0.55);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(63,213,192,0.55);
  color: #3FD5C0;
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.03em;
  white-space: nowrap;
}

/* ── Routine review cards ── */
.routine-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 12px;
  transition: border-color .25s;
}
.routine-card.reviewed-good    { border-color: rgba(63,213,192,0.35); }
.routine-card.reviewed-explore { border-color: rgba(255,177,64,0.35); }

.rc-header  { display:flex; align-items:flex-start; gap:12px; margin-bottom:14px; }
.rc-icon    { font-size:28px; flex-shrink:0; line-height:1; }
.rc-name    { font-size:15px; font-weight:700; margin-bottom:3px; }
.rc-summary { font-size:12px; color:var(--text-2); line-height:1.4; }

.rc-actions { display:flex; gap:8px; }
.rc-btn {
  flex:1; padding:10px 8px;
  border-radius:12px;
  font:500 13px 'Inter',system-ui;
  cursor:pointer;
  border:1.5px solid var(--border);
  background:var(--card-hi);
  color:var(--text-2);
  transition:all .15s;
}
.rc-btn:hover { border-color:var(--teal); color:var(--text-1); }
.rc-btn.worked.active  { background:rgba(63,213,192,0.1); border-color:var(--teal); color:var(--teal); font-weight:600; }
.rc-btn.explore.active { background:rgba(255,177,64,0.1); border-color:#FFB140; color:#FFB140; font-weight:600; }
.rc-btn:disabled { cursor:default; }

.rc-followup {
  margin-top:14px; padding-top:14px;
  border-top:1px solid var(--border);
}
.rc-fq   { font-size:14px; font-weight:600; margin-bottom:10px; }
.rc-opts { display:flex; flex-wrap:wrap; gap:7px; }
.rc-opt  {
  background:var(--card-hi);
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:7px 12px;
  font:500 12px 'Inter',system-ui;
  color:var(--text-2);
  cursor:pointer;
  transition:all .15s;
}
.rc-opt:hover    { border-color:var(--teal); color:var(--text-1); }
.rc-opt.selected { background:rgba(255,177,64,0.1); border-color:#FFB140; color:var(--text-1); font-weight:600; }
.rc-opt:disabled { cursor:default; }

/* ── Short recs ── */
.short-rec {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:10px;
  cursor:pointer;
  transition:all .15s;
}
.short-rec:hover { background:var(--card-hi); transform:translateX(4px); }
.sr-eyebrow { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text-2); margin-bottom:5px; }
.sr-title   { font-size:15px; font-weight:700; margin-bottom:4px; }
.sr-body    { font-size:13px; color:var(--text-2); line-height:1.45; margin-bottom:10px; }
.sr-action  { font-size:13px; font-weight:600; color:var(--teal); }

/* ── Phase layout (routine review) ── */
.phase-block {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 12px;
}
.phase-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 9px;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--border);
}
.phase-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .09em;
  color: var(--text-2);
}
.phase-time { font-size: 11px; color: var(--text-3); font-weight: 500; }

.phase-item {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  transition: background .2s;
}
.phase-header + .phase-item { border-top: none; }
.phase-item.reviewed-good    { background: rgba(63,213,192,0.05); }
.phase-item.reviewed-explore { background: rgba(255,177,64,0.05); }

.pi-row      { margin-bottom: 12px; }
.pi-name     { font-size: 14px; font-weight: 600; color: var(--text-1); margin-bottom: 7px; line-height: 1.25; }
.pi-attrs    { display: flex; flex-wrap: wrap; gap: 6px; }
.pi-attr     {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--text-2);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 3px 8px;
  line-height: 1.3;
}
.pi-attr-ico { font-size: 13px; line-height: 1; }

/* Vibe picker grid */
.vibe-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 4px;
}
.vibe-card {
  border-radius: 16px;
  padding: 16px 14px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--card);
  transition: all .18s;
}
.vibe-card:hover { transform: scale(1.02); }
.vibe-ico  { font-size: 28px; margin-bottom: 7px; line-height: 1; }
.vibe-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.vibe-sub  { font-size: 11px; color: var(--text-2); line-height: 1.35; }

/* Light save btn */
.light-save {
  width: 100%;
  border: none;
  border-radius: 14px;
  padding: 14px 0;
  font: 700 15px 'Inter', system-ui;
  cursor: pointer;
  color: #091422;
  margin-top: 14px;
  transition: opacity .15s;
}
.light-save:hover { opacity: .85; }
.light-save:disabled { opacity: 1; cursor: default; }

/* Alarm category chips */
.alarm-cats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.alarm-cat-btn {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 8px 14px;
  font: 500 13px 'Inter', system-ui;
  color: var(--text-2);
  cursor: pointer;
  transition: all .15s;
}
.alarm-cat-btn:hover  { border-color: #FFB140; color: var(--text-1); }
.alarm-cat-btn.active { background: rgba(255,177,64,0.12); border-color: #FFB140; color: var(--text-1); font-weight: 600; }

/* Card feed */
.alarm-feed {
  height: 300px;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  border-radius: 20px;
  scrollbar-width: none;
}
.alarm-feed::-webkit-scrollbar { display: none; }

.alarm-card {
  height: 300px;
  scroll-snap-align: start;
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.ac-art {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 100px;
  opacity: 0.22;
  filter: blur(3px);
  letter-spacing: 12px;
  user-select: none;
  padding-bottom: 60px;
}
.ac-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 72%;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
  pointer-events: none;
}
.ac-content { position: relative; z-index: 2; padding: 16px 16px 14px; }
.ac-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.ac-name { font-size: 22px; font-weight: 700; color: #fff; line-height: 1.15; }
.ac-play {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  border: 1.5px solid rgba(255,255,255,0.35);
  color: #fff; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: background .15s;
}
.ac-play:hover   { background: rgba(255,255,255,0.3); }
.ac-play.playing { background: rgba(63,213,192,0.45); border-color: #3FD5C0; }
.ac-paired {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: rgba(255,255,255,0.65);
  margin-bottom: 7px;
}
.ac-paired-dot { width: 8px; height: 8px; border-radius: 50%; background: #3FD5C0; flex-shrink: 0; }
.ac-desc-row { display: flex; align-items: flex-start; gap: 8px; }
.ac-desc { font-size: 12px; color: rgba(255,255,255,0.75); line-height: 1.5; flex: 1; }
.ac-heart {
  background: none; border: none;
  color: rgba(255,255,255,0.6); font-size: 20px;
  cursor: pointer; flex-shrink: 0; line-height: 1;
  transition: color .15s, transform .15s;
  padding: 0;
}
.ac-heart.liked { color: #ff4a6a; transform: scale(1.2); }

/* Vertical dots (right side of card) */
.ac-side-dots {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 5px;
  z-index: 3;
}
.ac-side-dot {
  width: 4px; height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.35);
  transition: all .2s;
}
.ac-side-dot.active { height: 16px; background: rgba(255,255,255,0.9); }

/* Alarm select btn */
.alarm-select-btn {
  width: 100%;
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 14px;
  padding: 13px 0;
  font: 600 15px 'Inter', system-ui;
  color: #fff;
  cursor: pointer;
  margin-top: 10px;
  transition: background .15s;
  display: none;
}
.alarm-select-btn.visible { display: block; }
.alarm-select-btn:hover   { background: rgba(255,255,255,0.2); }
.alarm-select-btn.selected { background: #3FD5C0; color: #091422; border-color: #3FD5C0; }

/* Feed wrapper (relative for overlay btn) */
.alarm-feed-wrap { position: relative; }

/* Proto bar */
.proto-bar { display: flex; align-items: center; gap: 14px; }
.proto-label { font-size: 11px; color: #2A3A56; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
.proto-reset {
  background: #131D30; border: 1px solid #243049;
  color: var(--text-2); border-radius: 8px;
  padding: 6px 14px; font-size: 12px;
  font-family: inherit; cursor: pointer; font-weight: 500;
  transition: all .15s;
}
.proto-reset:hover { background: var(--card); color: var(--text-1); }

/* ── Routine check-up ── */
.cu-phase-div {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .09em; color: var(--text-3);
  padding: 2px 0 10px; margin-top: 6px;
}
.cu-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px; overflow: hidden;
  margin-bottom: 14px; transition: border-color .25s;
}
.cu-card.cu-liked { border-color: rgba(63,213,192,0.45); }
.cu-card.cu-noped { border-color: rgba(255,80,80,0.3); }
.cu-img { width: 100%; height: 172px; object-fit: cover; display: block; }
.cu-body { padding: 14px 16px 16px; }
.cu-step-lbl {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--text-3); margin-bottom: 6px;
}
.cu-title { font-size: 16px; font-weight: 700; margin-bottom: 5px; line-height: 1.25; }
.cu-desc  { font-size: 13px; color: var(--text-2); line-height: 1.5; margin-bottom: 14px; }
.cu-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cu-btn {
  padding: 11px 0; border-radius: 12px;
  font: 600 14px 'Inter', system-ui; cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--card-hi); color: var(--text-2);
  transition: all .15s;
}
.cu-btn.like:hover  { background: rgba(63,213,192,0.1); border-color: var(--teal); color: var(--teal); }
.cu-btn.like.active { background: rgba(63,213,192,0.12); border-color: var(--teal); color: var(--teal); pointer-events:none; }
.cu-btn.nope:hover  { background: rgba(255,80,80,0.08); border-color: rgba(255,80,80,0.38); color: #ff6060; }
.cu-btn.nope.active { background: rgba(255,80,80,0.08); border-color: rgba(255,80,80,0.35); color: #ff6060; pointer-events:none; }
.cu-chips { border-top: 1px solid var(--border); padding: 14px 0 2px; margin-top: 12px; animation: revealUp .25s ease forwards; }
.cu-chips-lbl { font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 10px; }
.cu-chip-row  { display: flex; flex-wrap: wrap; gap: 7px; }
.cu-chip {
  background: var(--card-hi); border: 1.5px solid var(--border);
  border-radius: 20px; padding: 7px 13px;
  font: 500 12px 'Inter', system-ui; color: var(--text-2);
  cursor: pointer; transition: all .15s;
}
.cu-chip:hover    { border-color: rgba(255,80,80,0.38); color: var(--text-1); }
.cu-chip.selected { background: rgba(255,80,80,0.08); border-color: rgba(255,80,80,0.35); color: var(--text-1); font-weight: 600; pointer-events:none; }

/* Check-up rec cards */
.cu-rec-section { margin-bottom: 22px; }
.cu-rec-eyebrow { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; }
.cu-rec-eyebrow.ev-like { color: var(--teal); }
.cu-rec-eyebrow.ev-nope { color: var(--text-2); }
.cu-rec-heading { font-size: 15px; font-weight: 700; margin-bottom: 12px; line-height: 1.35; }
.cu-rec-scroll {
  display: flex; gap: 10px;
  overflow-x: auto; padding-bottom: 6px;
  scroll-snap-type: x mandatory; scrollbar-width: none;
}
.cu-rec-scroll::-webkit-scrollbar { display: none; }
.cu-rec-card {
  flex-shrink: 0; width: 156px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  scroll-snap-align: start; cursor: pointer; transition: transform .15s;
}
.cu-rec-card:hover { transform: translateY(-2px); }
.cu-rec-img-wrap { position: relative; }
.cu-rec-img  { width: 100%; height: 96px; object-fit: cover; display: block; }
.cu-rec-hatch-plus {
  position: absolute; top: 6px; right: 6px;
  background: rgba(13,22,38,0.78); backdrop-filter: blur(4px);
  border: 1px solid rgba(63,213,192,0.35);
  color: var(--teal); font: 600 9px 'Inter',system-ui;
  padding: 2px 5px; border-radius: 4px; letter-spacing: 0.02em;
  pointer-events: none;
}
.cu-rec-info { padding: 9px 10px 12px; }
.cu-rec-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; line-height: 1.25; }
.cu-rec-actions { margin-top: 6px; }
.cu-rec-primary-row { display:flex; gap:6px; margin-bottom:6px; }
.cu-rec-btn-eq {
  flex:1; border:1px solid var(--border); border-radius:8px;
  padding:7px 0; font:600 11px 'Inter',system-ui; color:var(--text-1);
  background:var(--card-hi); cursor:pointer; transition:all .15s;
  display:flex; align-items:center; justify-content:center; gap:4px;
}
.cu-rec-btn-eq:hover { border-color:var(--teal); color:var(--teal); }
.cu-rec-btn-eq.playing { border-color:var(--teal); color:var(--teal); background:rgba(63,213,192,0.08); }
.cu-rec-btn-eq.saved   { color:#ff6060; border-color:rgba(255,100,100,0.4); }
.cu-rec-add {
  display:block; background:none; border:none; padding:3px 0;
  font:500 10px 'Inter',system-ui; color:var(--text-3);
  cursor:pointer; transition:color .15s; width:100%; text-align:center; white-space:nowrap;
}
.cu-rec-add:hover { color:var(--teal); }
.cu-rec-add.added { color:var(--teal); cursor:default; }
.cu-phase-header {
  font-size: 11px; font-weight: 700; color: var(--text-2);
  text-transform: uppercase; letter-spacing: .09em;
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}

/* ── SWIPE DECK ─────────────────────────────────────────────────────────── */
.swipe-header { margin-bottom: 12px; }
.swipe-dots { display:flex; justify-content:center; gap:7px; margin-top:10px; }
.swipe-dot {
  width:7px; height:7px; border-radius:50%;
  background: var(--border); transition: all .25s ease;
}
.swipe-dot.active { width:20px; border-radius:3px; background: var(--text-2); }
.swipe-dot.done-like { background: var(--teal); }
.swipe-dot.done-nope { background: #ff6060; }

.swipe-headline {
  font-size:20px; font-weight:700; margin-bottom:6px; line-height:1.3;
}
.swipe-stage {
  position: relative;
  height: 456px;
  margin-bottom: 20px;
  perspective: 900px;
}
.swipe-card {
  position: absolute;
  top: 0; left: 0; right: 0; height: 456px;
  border-radius: 24px;
  user-select: none;
  -webkit-user-select: none;
  will-change: transform;
  transition: transform 0.2s ease;
  transform-style: preserve-3d;
}
.swipe-card-front, .swipe-card-back {
  position: absolute; top:0; left:0; right:0; bottom:0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 24px;
  overflow: hidden;
  background: var(--card);
  border: 1px solid var(--border);
}
.swipe-card-back {
  transform: rotateY(180deg);
}
.swipe-card.flipped {
  transition: transform 0.5s ease !important;
  transform: rotateY(180deg) !important;
}
.swipe-card.is-top {
  z-index: 10;
  cursor: grab;
  box-shadow: 0 10px 40px rgba(0,0,0,0.45);
  transition: none;
}
.swipe-card.is-top.snapping { transition: transform 0.25s ease; }
.swipe-card.is-next  { z-index:9;  transform: scale(0.95) translateY(14px); }
.swipe-card.is-third { z-index:8;  transform: scale(0.90) translateY(26px); }
.swipe-card.fly-right { transition: transform 0.35s ease, opacity 0.35s ease !important; transform: translateX(140%) rotate(24deg) !important; opacity:0 !important; }
.swipe-card.fly-left  { transition: transform 0.35s ease, opacity 0.35s ease !important; transform: translateX(-140%) rotate(-24deg) !important; opacity:0 !important; }
.swipe-card.fly-up    { transition: transform 0.28s ease, opacity 0.28s ease !important; transform: translateY(-80px) scale(0.9) !important; opacity:0 !important; }

.swipe-img { width:100%; height:210px; object-fit:cover; display:block; pointer-events:none; }
.swipe-info { padding:16px 18px 18px; }
.swipe-phase-lbl {
  font-size:11px; font-weight:700; color:var(--text-2);
  text-transform:uppercase; letter-spacing:.09em; margin-bottom:5px;
}
.swipe-step-name { font-size:13px; color:var(--text-2); margin-bottom:3px; }
.swipe-title { font-size:19px; font-weight:700; line-height:1.25; margin-bottom:6px; }
.swipe-desc  { font-size:13px; color:var(--text-2); line-height:1.5; }

.swipe-ov {
  position:absolute; top:18px;
  font-size:26px; font-weight:800;
  border: 3.5px solid; border-radius:10px;
  padding:5px 14px; opacity:0;
  pointer-events:none; transition:opacity .08s;
}
.swipe-ov-like { right:18px; color:var(--teal);  border-color:var(--teal);  transform:rotate(12deg); }
.swipe-ov-nope { left:18px;  color:#ff6060; border-color:#ff6060; transform:rotate(-12deg); }

.swipe-btns {
  display:flex; justify-content:center; gap:36px;
  padding-bottom: 4px;
}
.swipe-btn {
  width:64px; height:64px; border-radius:50%; border:2px solid;
  background:none; font-size:24px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition: transform .15s, background .15s;
}
.swipe-btn:active { transform: scale(0.9); }
.swipe-btn-nope { border-color:rgba(255,96,96,.4); color:#ff6060; }
.swipe-btn-nope:hover { background:rgba(255,96,96,.08); }
.swipe-btn-like { border-color:rgba(63,213,192,.4); color:var(--teal); }
.swipe-btn-like:hover { background:rgba(63,213,192,.08); }

.swipe-followup {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; height:100%; padding:28px 22px;
  text-align:center;
}
.swipe-fu-emoji { font-size:40px; margin-bottom:14px; }
.swipe-fu-title { font-size:18px; font-weight:700; margin-bottom:5px; line-height:1.3; }
.swipe-fu-sub   { font-size:13px; color:var(--text-2); margin-bottom:20px; line-height:1.45; font-style:italic; }
.swipe-fu-chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:16px; }
.swipe-fu-chip  {
  background:var(--card-hi); border:1.5px solid var(--border);
  border-radius:20px; padding:8px 15px;
  font:500 13px 'Inter',system-ui; color:var(--text-1);
  cursor:pointer; transition:all .15s;
}
.swipe-fu-chip:hover  { border-color:rgba(255,96,96,.4); color:#ff9090; }
.swipe-fu-chip.picked { background:rgba(255,96,96,.08); border-color:rgba(255,96,96,.35); pointer-events:none; }
.swipe-skip {
  background:none; border:none; color:var(--text-3);
  font:500 13px 'Inter',system-ui; cursor:pointer;
  transition:color .15s; padding:4px 0;
}
.swipe-skip:hover { color:var(--text-2); }

.swipe-done-wrap {
  position:absolute; top:0; left:0; right:0; height:100%;
  background:var(--card); border:1px solid var(--border);
  border-radius:24px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:32px 24px; text-align:center; z-index:20;
  animation: revealUp .35s ease forwards;
}
.swipe-done-star { font-size:36px; margin-bottom:14px; color:var(--teal); }
.swipe-done-title { font-size:19px; font-weight:700; line-height:1.3; margin-bottom:8px; }
.swipe-done-sub   { font-size:13px; color:var(--text-2); line-height:1.5; margin-bottom:24px; }

/* ── TAB BAR ─────────────────────────────────────────────────────────────── */
.tab-bar {
  position:absolute; bottom:0; left:0; right:0; height:64px;
  background:rgba(10,16,32,0.97); border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-around;
  padding:0 8px 6px; z-index:50;
}
.tab-btn {
  background:none; border:none; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:8px 16px; opacity:.45; transition:opacity .15s;
}
.tab-btn.active { opacity:1; }
.tab-ico { font-size:18px; line-height:1; }
.tab-lbl { font-size:11px; font-weight:600; color:var(--text-2); font-family:'Inter',system-ui; }
.tab-btn.active .tab-lbl { color:var(--teal); }

/* ── PLAN TAB ────────────────────────────────────────────────────────────── */
.plan-h1 { font-size:26px; font-weight:700; margin-bottom:20px; }
.plan-tiles { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.plan-tile {
  background:#193a63; border-radius:12px; padding:12px;
  cursor:pointer; transition:background .15s;
}
.plan-tile:hover { background:#1e4478; }
.plan-tile-lbl { font-size:12px; color:var(--text-2); margin-bottom:8px; display:flex; align-items:center; gap:4px; }
.plan-tile-time { font-size:22px; font-weight:700; line-height:1.1; margin-bottom:4px; }
.plan-tile-sub  { font-size:12px; color:var(--text-2); }
.plan-tile-inline { font-size:12px; color:var(--text-2); }
.plan-tile-dot { margin:0 2px; }
.plan-section-hd {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px;
}
.plan-section-lbl { font-size:14px; color:var(--text-2); display:flex; align-items:center; gap:5px; }
.plan-start-btn {
  background:#fff; color:#0a1a34; border:none; border-radius:20px;
  padding:6px 16px; font:700 13px 'Inter',system-ui; cursor:pointer;
  display:flex; align-items:center; gap:5px;
}
.plan-row {
  background:#193a63; border-radius:12px;
  display:flex; align-items:center; gap:12px;
  padding:8px 12px 8px 8px; margin-bottom:8px; cursor:pointer;
  transition:background .15s;
}
.plan-row:hover { background:#1e4478; }
.plan-row-thumb {
  width:56px; height:56px; border-radius:8px;
  object-fit:cover; flex-shrink:0;
}
.plan-row-info { flex:1; min-width:0; }
.plan-row-title { font-size:14px; font-weight:600; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.plan-row-sub   { font-size:12px; color:var(--text-2); }
.plan-row-chev  { color:var(--text-3); font-size:16px; flex-shrink:0; }
.plan-add-row {
  border:2px dashed var(--border); border-radius:12px;
  padding:16px; text-align:center;
  font-size:14px; color:var(--text-2); cursor:pointer;
  margin-bottom:20px; transition:border-color .15s;
}
.plan-add-row:hover { border-color:var(--teal); color:var(--teal); }
.plan-fav-h { font-size:16px; font-weight:700; margin-bottom:12px; }
.plan-fav-empty { font-size:13px; color:var(--text-3); line-height:1.6; padding:16px 0; }
.plan-fav-scroll {
  display:flex; gap:8px; overflow-x:auto; padding-bottom:8px;
  scrollbar-width:none; scroll-snap-type:x mandatory;
}
.plan-fav-scroll::-webkit-scrollbar { display:none; }
.plan-fav-card {
  flex-shrink:0; width:120px; height:185px;
  border-radius:12px; overflow:hidden; position:relative;
  background:var(--card); scroll-snap-align:start;
}
.plan-fav-img { width:100%; height:90px; object-fit:cover; display:block; }
.plan-fav-heart {
  position:absolute; top:8px; right:8px;
  color:#ff6060; font-size:14px; pointer-events:none;
}
.plan-fav-body {
  padding:8px; display:flex; flex-direction:column; gap:8px;
  background:linear-gradient(to bottom, rgba(19,41,75,0.5), #13294b);
  position:absolute; bottom:0; left:0; right:0;
}
.plan-fav-name { font-size:13px; font-weight:500; line-height:1.3; }
.plan-fav-add {
  background:#0a1a34; border:none; border-radius:20px;
  padding:6px 0; font:600 12px 'Inter',system-ui;
  color:#fff; cursor:pointer; width:100%; transition:opacity .15s;
  display:flex; align-items:center; justify-content:center; gap:4px;
}
.plan-fav-add:hover { opacity:.8; }
.plan-fav-add.added { color:var(--teal); }

/* ── SWIPE RECS (V2) ─────────────────────────────────────────────────────── */
.rec-swipe-phase-headline { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.rec-swipe-phase-emoji { font-size:24px; line-height:1; }
.rec-swipe-phase-name { font-size:20px; font-weight:700; line-height:1.3; }
.rec-swipe-context { font-size:14px; color:var(--text-2); line-height:1.45; margin-bottom:14px; }
.rec-swipe-context em { color:var(--text-1); font-style:normal; font-weight:600; }
.rec-swipe-stage { position:relative; height:420px; margin-bottom:12px; }
.rec-swipe-card {
  position:absolute; top:0; left:0; right:0; height:400px;
  background:var(--card); border:1px solid var(--border);
  border-radius:24px; overflow:hidden; user-select:none;
  -webkit-user-select:none; will-change:transform;
  transition:transform 0.2s ease;
}
.rec-swipe-card.is-top { z-index:10; cursor:grab; box-shadow:0 10px 40px rgba(0,0,0,0.45); transition:none; }
.rec-swipe-card.is-top.snapping { transition:transform 0.25s ease; }
.rec-swipe-card.is-next  { z-index:9;  transform:scale(0.96) translateY(20px); }
.rec-swipe-card.is-third { z-index:8;  transform:scale(0.92) translateY(38px); }
.rec-swipe-card.fly-right { transition:transform 0.35s ease, opacity 0.35s ease !important; transform:translateX(140%) rotate(24deg) !important; opacity:0 !important; }
.rec-swipe-card.fly-left  { transition:transform 0.35s ease, opacity 0.35s ease !important; transform:translateX(-140%) rotate(-24deg) !important; opacity:0 !important; }
.rec-swipe-img-wrap { position:relative; }
.rec-swipe-img { width:100%; height:180px; object-fit:cover; display:block; pointer-events:none; }
.rec-swipe-badge {
  position:absolute; top:6px; right:6px;
  background:rgba(13,22,38,0.78); backdrop-filter:blur(4px);
  border:1px solid rgba(63,213,192,0.35); color:var(--teal);
  font:600 9px 'Inter',system-ui; padding:2px 5px; border-radius:4px;
  letter-spacing:0.02em; pointer-events:none;
}
.rec-swipe-info { padding:14px 18px 0; }
.rec-swipe-name { font-size:18px; font-weight:700; line-height:1.25; margin-bottom:4px; }
.rec-swipe-desc { font-size:13px; color:var(--text-2); line-height:1.5; margin-bottom:14px; }
.rec-swipe-actions { display:flex; flex-direction:column; gap:8px; padding:0 18px 14px; }
.rec-swipe-preview {
  width:100%; border:none; background:var(--teal); border-radius:10px;
  padding:12px 0; font:700 14px 'Inter',system-ui; color:#0a1a34;
  cursor:pointer; transition:opacity .15s;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.rec-swipe-preview:hover { opacity:.85; }
.rec-swipe-preview.playing { background:rgba(63,213,192,.15); color:var(--teal); }
.rec-swipe-add {
  width:100%; border:1.5px solid var(--border); background:transparent; border-radius:10px;
  padding:10px 0; font:600 13px 'Inter',system-ui; color:var(--text-2);
  cursor:pointer; transition:all .15s;
}
.rec-swipe-add:hover { border-color:rgba(63,213,192,.35); color:var(--text-1); }
.rec-swipe-add.added { border-color:rgba(63,213,192,.35); color:var(--teal); }
.rec-swipe-ov {
  position:absolute; top:18px; font-size:22px; font-weight:800;
  border:3px solid; border-radius:10px; padding:4px 12px; opacity:0;
  pointer-events:none; transition:opacity .08s;
}
.rec-swipe-ov-like { right:18px; color:var(--teal); border-color:var(--teal); transform:rotate(12deg); }
.rec-swipe-ov-nope { left:18px; color:#ff6060; border-color:#ff6060; transform:rotate(-12deg); }
.rec-swipe-counter {
  text-align:center; font-size:12px; color:var(--text-3); margin-bottom:16px;
}
.rec-swipe-done {
  text-align:center; padding:40px 20px;
}
.rec-swipe-done-star { font-size:32px; color:var(--teal); margin-bottom:12px; }
.rec-swipe-done-title { font-size:18px; font-weight:700; margin-bottom:6px; }
.rec-swipe-done-sub { font-size:13px; color:var(--text-2); line-height:1.5; margin-bottom:20px; }

/* Why chips */
.why-chips { display:flex; flex-wrap:wrap; gap:10px; }
.why-chip {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 24px;
  padding: 10px 18px;
  font: 500 14px 'Inter', system-ui;
  color: var(--text-1);
  cursor: pointer;
  transition: all .15s;
}
.why-chip:hover { border-color: var(--teal); background: var(--card-hi); }
.why-chip.why-chip-selected { background: rgba(63,213,192,0.12); border-color: var(--teal); color: var(--text-1); font-weight: 600; }

/* Debug toggle */
.debug-bar {
  display:flex; align-items:center; justify-content:center; gap:8px;
  margin-top:8px;
}
.debug-bar span { font-size:11px; color:var(--text-3); font-weight:600; text-transform:uppercase; letter-spacing:.06em; }
.debug-bar span.active { color:var(--teal); }
.debug-sw {
  position:relative; width:36px; height:20px; border-radius:10px;
  background:var(--card-hi); border:1px solid var(--border);
  cursor:pointer; transition:background .2s;
}
.debug-sw.on { background:rgba(63,213,192,.25); border-color:rgba(63,213,192,.4); }
.debug-sw::after {
  content:''; position:absolute; top:2px; left:2px;
  width:14px; height:14px; border-radius:50%;
  background:var(--text-2); transition:transform .2s, background .2s;
}
.debug-sw.on::after { transform:translateX(16px); background:var(--teal); }

function getChipsForItem(theme, tags) {
  const priority = THEME_CHIP_PRIORITY[theme] || ['sonic', 'vibe', 'outcome', 'sensory', 'engagement'];
  const byCategory = {};
  for (const tag of tags) {
    if (tag === 'voice-led') {
      if (!byCategory.sonic) byCategory.sonic = [];
      byCategory.sonic.push({ label: "Didn't like the narrator's voice", tag });
      byCategory.sonic.push({ label: "I don't want a narrator", tag });
      continue;
    }
    const entry = TAG_CHIPS[tag];
    if (!entry) continue;
    const [cat, chip] = entry;
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push({ label: chip, tag });
  }
  const chips = [];
  for (const cat of priority) {
    if (chips.length >= 4) break;
    if (byCategory[cat]?.length) {
      const limit = chips.length === 0 ? 2 : 1;
      chips.push(...byCategory[cat].slice(0, limit));
    }
  }
  return chips.slice(0, 4);
}

const PHASE_EXCLUDE_TAGS = {
  'Sleep':         new Set(['energized-wake','gentle-wake','gentle-rise']),
  'Unwind':        new Set(['energized-wake','gentle-wake','gentle-rise']),
  'Sunrise Alarm': new Set(['fall-asleep','stay-asleep']),
};

function computeRecs(item, verdict, chipTag) {
  const ptags = new Set(item.tags);
  const exclude = PHASE_EXCLUDE_TAGS[item.phase] || new Set();
  let pool = REC_CATALOG.filter(c =>
    c.phase === item.phase &&
    c.title !== item.title &&
    !c.tags.some(t => exclude.has(t))
  );
  pool = pool.map(c => ({ ...c, overlap: c.tags.filter(t => ptags.has(t)).length }));
  if (verdict === 'like') {
    pool.sort((a, b) => {
      const sameA = a.theme === item.theme ? 1 : 0;
      const sameB = b.theme === item.theme ? 1 : 0;
      if (sameB - sameA !== 0) return sameB - sameA;
      return b.overlap - a.overlap;
    });
  } else {
    const themesInPhase = new Set(REC_CATALOG.filter(c => c.phase === item.phase).map(c => c.theme));
    if (themesInPhase.size > 1) {
      pool = pool.filter(c => c.theme !== item.theme);
    }
    if (chipTag) pool = pool.filter(c => !c.tags.includes(chipTag));
    pool.sort((a, b) => a.overlap - b.overlap);
  }
  return pool.slice(0, 3);
}

function navigate(html, direction) {
  const c = document.getElementById('content');
  const old = c.querySelector('.screen');
  const neo = document.createElement('div');
  neo.className = 'screen ' + (direction === 'back' ? 'from-left' : 'from-right');
  neo.innerHTML = html;
  c.appendChild(neo);
  c.scrollTop = 0;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    if (old) old.classList.add(direction === 'back' ? 'exit-right' : 'exit-left');
    neo.classList.remove('from-right', 'from-left');
    neo.classList.add('slide-in');
  }));
  if (old) setTimeout(() => old.remove(), 350);
}

function go(html)     { navigate(html, 'forward'); }
function goBack(html) { navigate(html, 'back'); }

function resetFlow() {
  S = { q1: null, branch: null };

}

function reviewMark(itemId, verdict) {
  const item    = document.getElementById(`pi-${itemId}`);
  const actions = document.getElementById(`pica-${itemId}`);
  const followup= document.getElementById(`pif-${itemId}`);

  actions.querySelectorAll('.rc-btn').forEach(b => { b.classList.remove('active'); b.disabled = true; });

  if (verdict === 'worked') {
    reviewState[itemId] = 'worked';
    actions.querySelector('.worked').classList.add('active');
    item.classList.add('reviewed-good');
    followup.style.display = 'none';
  } else {
    actions.querySelector('.explore').classList.add('active');
    item.classList.add('reviewed-explore');
    followup.style.display = 'block';
    setTimeout(() => followup.scrollIntoView({ behavior:'smooth', block:'nearest' }), 60);
  }
  checkReviewCta();
}

function reviewIssue(itemId, idx) {
  reviewState[itemId] = { issue: idx };
  const followup = document.getElementById(`pif-${itemId}`);
  followup.querySelectorAll('.rc-opt').forEach((b,i) => {
    b.classList.toggle('selected', i === idx);
    b.disabled = true;
  });
  checkReviewCta();
}

function checkReviewCta() {
  if (Object.keys(reviewState).length >= 1) {
    const cta = document.getElementById('review-cta');
    if (cta && cta.style.display === 'none') {
      cta.style.display = 'block';
      setTimeout(() => cta.scrollIntoView({ behavior:'smooth', block:'nearest' }), 80);
    }
  }
}

function routineRecsHTML() {
  const items = allPhaseItems();
  const explorRecs = [], workedRecs = [];
  Object.entries(reviewState).forEach(([id, state]) => {
    const item = items[id];
    if (!item) return;
    if (state === 'worked') {
      (item.recs_worked || []).forEach(r => workedRecs.push({ ...r, component: id, worked: true }));
    } else if (state.issue !== undefined) {
      (item.recs[state.issue] || []).forEach(r => explorRecs.push({ ...r, component: id }));
    }
  });

  const hasExplore = explorRecs.length > 0;
  const hasWorked  = workedRecs.length > 0;
  const heading    = hasExplore ? 'A few things worth exploring' : 'Last night clicked. 🎉';
  const subhead    = hasExplore
    ? 'No pressure — try one tonight and see what shifts.'
    : 'Your routine is in good shape. A little more to discover when you\'re ready.';

  function recCard(rec) {
    const br         = BRANCHES[rec.flow];
    const flowLabel  = { alarm:'Alarm', winddown:'Wind-down', sounds:'Sleep sounds', bedtime:'Bedtime' }[rec.flow] || '';
    const eyebrow    = rec.worked
      ? `✦ More like this`
      : `${br ? br.icon : ''} ${flowLabel}`;
    const borderStyle = rec.worked ? 'border-color:rgba(63,213,192,0.3)' : '';
    return `
      <div class="short-rec" style="${borderStyle}" onclick="go(deepDiveHTML('${rec.flow}'))">
        <div class="sr-eyebrow">${eyebrow}</div>
        <div class="sr-title">${rec.title}</div>
        <div class="sr-body">${rec.body}</div>
        <div class="sr-action">${rec.cta}</div>
      </div>`;
  }

  const toShow  = [...explorRecs, ...workedRecs].slice(0, 4);
  const fallback = toShow.length === 0 ? [
    { title:'Explore a new alarm vibe', body:'You might find something you enjoy even more than what\'s running now.', cta:'Browse alarm sounds →', flow:'alarm', worked:false },
    { title:'Add a Sleep Cast to your wind-down', body:'A short story or guided session before your playlist can make the transition feel more intentional.', cta:'Browse Sleep Casts →', flow:'winddown', worked:false },
  ] : toShow;

  const recsHtml = fallback.map(recCard).join('');

  return `
    <button class="back" onclick="goBack(routineReviewHTML())">← Back</button>
    <div class="recs-header">
      <div class="recs-title" style="color:#3FD5C0">${heading}</div>
      <div class="recs-sub">${subhead}</div>
    </div>
    ${recsHtml}
    <div class="done-card" style="margin-top:8px">
      <div class="done-title">Check back tomorrow morning</div>
      <div class="done-sub">We'll keep refining as we learn what works for you.</div>
    </div>
  `;
}

function pickAlarmVibe(vibeKey) {
  const vibe = ALARM_VIBES.find(v => v.key === vibeKey);
  if (!vibe) return;

  // Highlight selected, dim others
  ALARM_VIBES.forEach(v => {
    const el = document.getElementById(`vibe-${v.key}`);
    if (!el) return;
    if (v.key === vibeKey) {
      el.style.border = `1.5px solid ${vibe.color}`;
      el.style.boxShadow = `0 0 0 2px ${vibe.color}30`;
      el.style.transform = 'scale(1.03)';
    } else {
      el.style.opacity = '0.35';
      el.style.pointerEvents = 'none';
    }
  });

  const isRec = vibe.catKey === getAlarmRec();
  let cards = (ALARM_CATS[vibe.catKey]?.cards || []).slice(0, 3);
  if (cards.length === 0) {
    const all = Object.values(ALARM_CATS).flatMap(c => c.cards);
    cards = [all[Math.floor(Math.random() * all.length)]];
  }

  alarmFeedIdx = 0;
  const container = document.getElementById('alarm-vibe-feed');
  container.innerHTML = `
    <div style="margin-top:18px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text-2);margin-bottom:10px;">

  renderSideDots(cards.length, 0);

  const feedEl = document.getElementById('alarm-feed');

    feedEl.addEventListener('scroll', () => {
      alarmFeedIdx = Math.round(feedEl.scrollTop / 300);
      renderSideDots(cards.length, alarmFeedIdx);
    }, { passive: true });
  }

  setTimeout(() => container.scrollIntoView({ behavior: 'smooth', block: 'start' }), 60);
}

function _followupCardHTML(item) {
  const chipObjs = getChipsForItem(item.theme, item.tags);
  const themeQuestions = {
    'Sleep Sounds':  "What about the sound didn't work?",
    'Stories':       "What about the story didn't land?",
    'Sunrise Alarm': "Was the wake-up right for you?",
    'Meditations':   "What didn't click about it?",
    'Music':         "What didn't land about the music?",
    'Soundscapes':   "What didn't work about the soundscape?",
    'Sound Bath':    "What felt off about it?",
    'Podcasts':      "What didn't work about it?",
    'ASMR':          "What didn't work about it?",
  };
  const question = themeQuestions[item.theme] || "What didn't land?";
  const chips = chipObjs.map(c =>
    `<button class="swipe-fu-chip" onclick="_pickChip('${item.id}','${c.label.replace(/'/g,"\\'")}','${c.tag}')">${c.label}</button>`
  ).join('');
  return `
    <div class="swipe-followup">
      <div class="swipe-fu-emoji">🤔</div>
      <div class="swipe-fu-title">${question}</div>
      <div class="swipe-fu-sub">${item.title}</div>
      <div class="swipe-fu-chips">${chips}</div>
      <button class="swipe-skip" onclick="_pickChip('${item.id}',null,null)">Skip →</button>
    </div>
  `;
}

function _renderStack() {
  const stage = document.getElementById('swipe-stage');
  if (!stage) return;
  // Clear any old cards first, keep done-wrap if present
  stage.querySelectorAll('.swipe-card').forEach(c => c.remove());
  const visible = _deck.slice(_deckIdx, _deckIdx + 3);
  visible.forEach((entry, i) => {
    const el = document.createElement('div');
    el.className = 'swipe-card ' + (i === 0 ? 'is-top' : i === 1 ? 'is-next' : 'is-third');
    el.innerHTML = _contentCardHTML(entry.item);
    stage.appendChild(el);
  });
  const btns = document.getElementById('swipe-btns');
  if (btns) btns.style.display = _deckIdx < _deck.length ? 'flex' : 'none';
}

const CHECKUP_PHASE_EMOJI = { 'Bedtime': '🌙', 'Bedtime Playlist': '🎵', 'Rise Time': '☀️' };

function _updateCheckupHeadline() {
  const el = document.getElementById('checkup-headline');
  if (!el) return;
  if (_deckIdx >= _deck.length) { el.innerHTML = ''; return; }
  const item = _deck[_deckIdx].item;
  const emoji = CHECKUP_PHASE_EMOJI[item.phaseLabel] || '✦';
  el.innerHTML = `
    <div style="font-size:22px;font-weight:700;line-height:1.25;margin-bottom:4px;">Here's what played last night</div>
    <div style="font-size:13px;color:var(--text-2);margin-bottom:8px;">${emoji} ${item.phaseLabel}</div>
  `;
}

function _updateDots() {
  const el = document.getElementById('swipe-dots');
  if (!el) return;
  el.innerHTML = _deck.map((entry, n) => {
    const item = entry.item;
    const st = checkupState[item.id];
    let cls = '';
    if (st) cls = st.verdict === 'like' ? 'done-like' : 'done-nope';
    else if (n === _deckIdx) cls = 'active';
    return `<div class="swipe-dot ${cls}"></div>`;
  }).join('');
  _updateCheckupHeadline();
}

function _initDrag() {
  const stage = document.getElementById('swipe-stage');
  if (!stage) return;
  const top = stage.querySelector('.is-top');
  if (!top) return;

  function start(e) {
    if (top.classList.contains('flipped')) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    _drag = { startX: x, dx: 0, card: top };
    top.classList.remove('snapping');
    top.style.transition = 'none';
  }
  function move(e) {
    if (!_drag) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    _drag.dx = x - _drag.startX;
    if (Math.abs(_drag.dx) < 4) return;
    if (e.cancelable) e.preventDefault();
    const rot = _drag.dx * 0.055;
    top.style.transform = `translateX(${_drag.dx}px) rotate(${rot}deg)`;
    const likeOv = top.querySelector(`[id^="ov-like-"]`);
    const nopeOv = top.querySelector(`[id^="ov-nope-"]`);
    if (likeOv) likeOv.style.opacity = Math.min(1, Math.max(0, _drag.dx / SWIPE_THRESH));
    if (nopeOv) nopeOv.style.opacity = Math.min(1, Math.max(0, -_drag.dx / SWIPE_THRESH));
  }
  function end() {
    if (!_drag) return;
    const dx = _drag.dx;
    _drag = null;
    if (Math.abs(dx) >= SWIPE_THRESH) {
      _commitSwipe(dx > 0 ? 'like' : 'nope');
    } else {
      top.classList.add('snapping');
      top.style.transform = '';
      const likeOv = top.querySelector(`[id^="ov-like-"]`);
      const nopeOv = top.querySelector(`[id^="ov-nope-"]`);
      if (likeOv) likeOv.style.opacity = 0;
      if (nopeOv) nopeOv.style.opacity = 0;
    }
  }

  top.addEventListener('touchstart', start, { passive: true });
  top.addEventListener('touchmove', move, { passive: false });
  top.addEventListener('touchend', end);
  top.addEventListener('mousedown', start);
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', end, { once: true });
}

function swipeCard(verdict) {
  const stage = document.getElementById('swipe-stage');
  if (!stage) return;
  const top = stage.querySelector('.is-top');
  if (top && top.classList.contains('flipped')) return;
  _commitSwipe(verdict);
}

function _commitSwipe(verdict) {
  const stage = document.getElementById('swipe-stage');
  if (!stage) return;
  const top = stage.querySelector('.is-top');
  if (!top) return;

  const entry = _deck[_deckIdx];
  checkupState[entry.item.id] = { verdict, chip: null };

  if (verdict === 'nope') {
    top.classList.add('flipped');
    const btns = document.getElementById('swipe-btns');
    if (btns) btns.style.display = 'none';
    return;
  }

  // Animate backing cards up during the fly-off
  const next  = stage.querySelector('.is-next');
  const third = stage.querySelector('.is-third');
  if (next)  { next.style.transition = 'transform 0.32s ease'; next.style.transform = ''; }
  if (third) { third.style.transition = 'transform 0.32s ease'; third.style.transform = 'scale(0.95) translateY(14px)'; }

  top.classList.add('fly-right');

  setTimeout(() => {
    _deckIdx++;
    if (_deckIdx >= _deck.length) { _showDone(); return; }
    _renderStack();
    _updateDots();
    _initDrag();
  }, 370);
}

function _pickChip(itemId, chip, chipTag) {
  if (checkupState[itemId]) {
    if (chip) checkupState[itemId].chip = chip;
    if (chipTag) checkupState[itemId].chipTag = chipTag;
  }
  const stage = document.getElementById('swipe-stage');
  if (!stage) return;
  const top = stage.querySelector('.is-top');
  if (!top) return;
  if (chip) {
    const btn = [...top.querySelectorAll('.swipe-fu-chip')].find(b => b.textContent === chip);
    if (btn) btn.classList.add('picked');
  }

  const next  = stage.querySelector('.is-next');
  const third = stage.querySelector('.is-third');
  if (next)  { next.style.transition = 'transform 0.32s ease'; next.style.transform = ''; }
  if (third) { third.style.transition = 'transform 0.32s ease'; third.style.transform = 'scale(0.95) translateY(14px)'; }

  setTimeout(() => {
    top.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
    top.style.transform = 'rotateY(180deg) translateX(-140%) rotate(-12deg)';
    top.style.opacity = '0';
  }, chip ? 350 : 0);

  setTimeout(() => {
    _deckIdx++;
    if (_deckIdx >= _deck.length) { _showDone(); return; }
    _renderStack();
    _updateDots();
    _initDrag();
    const btns = document.getElementById('swipe-btns');
    if (btns) btns.style.display = 'flex';
  }, chip ? 750 : 400);
}

function _showDone() {
  const stage = document.getElementById('swipe-stage');
  const btns  = document.getElementById('swipe-btns');
  if (btns) btns.style.display = 'none';
  _updateDots();

  const liked = Object.values(checkupState).filter(s => s.verdict === 'like').length;
  const total = CHECKUP_ITEMS.length;
  const heading = liked === total
    ? "Your routine is clicking. 🎉"
    : liked === 0
    ? "Fresh start — let's find what works."
    : "Got it, let's find your next listen.";
  const sub = liked === total
    ? "Looks like last night was a good one. Explore more options below if you're curious."
    : "Based on your picks, we've pulled together some options worth trying tonight. Add or favorite to save for later.";

  if (stage) {
    stage.querySelectorAll('.swipe-card').forEach(c => c.remove());
    const wrap = document.createElement('div');
    wrap.className = 'swipe-done-wrap';
    wrap.innerHTML = `
      <div class="swipe-done-star">✦</div>
      <div class="swipe-done-title">${heading}</div>
      <div class="swipe-done-sub">${sub}</div>
      <button class="save-btn" style="background:#3FD5C0;margin-top:0;width:100%;" onclick="go(_recMode === 'swipe' ? checkupRecsSwipeHTML() : checkupRecsHTML())">See what we found →</button>
    `;
    stage.appendChild(wrap);
  }
}

function checkupRecsHTML() {
  // Group rated items by phase, preserving order
  const phaseOrder = [];
  const phaseGroups = {};
  CHECKUP_ITEMS.forEach(item => {
    if (!checkupState[item.id]) return;
    if (!phaseGroups[item.phase]) { phaseOrder.push(item.phase); phaseGroups[item.phase] = []; }
    phaseGroups[item.phase].push(item);
  });

  const phaseCTAs = { 'Sleep': '+ Add to Bedtime', 'Unwind': '+ Add to Bedtime Playlist', 'Sunrise Alarm': '+ Add to Alarm' };

  const sectionsHtml = phaseOrder.map(phase => {
    const phaseLabel = phaseGroups[phase][0]?.phaseLabel || phase;
    const ctaLabel   = phaseCTAs[phase] || '+ Add';

    const itemSections = phaseGroups[phase].map(item => {
      const state = checkupState[item.id];
      const isLike = state.verdict === 'like';
      const recs = computeRecs(item, state.verdict, state.chipTag || null);
      const eyebrow    = isLike ? 'ev-like' : 'ev-nope';
      const eyebrowTxt = isLike ? '✦ More like this' : 'Something different';
      const heading    = isLike
        ? `You liked <em>${item.title}</em> — here's what else might click`
        : `Instead of <em>${item.title}</em>${state.chip ? ` (${state.chip.toLowerCase()})` : ''}`;

      const recCards = recs.map(r => `
        <div class="cu-rec-card">
          <div class="cu-rec-img-wrap">
            ${_ci(r.img, r.title, 'cu-rec-img')}
            ${r.tier === 'paid' ? '<span class="cu-rec-hatch-plus">✦ Hatch+</span>' : ''}
          </div>
          <div class="cu-rec-info">
            <div class="cu-rec-name">${r.title}</div>
            <div class="cu-rec-actions">
              <div class="cu-rec-primary-row">
                <button class="cu-rec-btn-eq" onclick="previewRec(this)">▶ Preview</button>
                <button class="cu-rec-btn-eq" onclick="favRec(this, '${r.title}', '${r.img}', '${r.tier}')">♡ Save</button>
              </div>
              <button class="cu-rec-add" onclick="addRec(this,'${ctaLabel}','${phase}','${r.title.replace(/'/g,"\\'")}','${r.img}')">${ctaLabel}</button>
            </div>
          </div>
        </div>
      `).join('');

      return `
        <div class="cu-rec-section" style="margin-bottom:18px;">
          <div class="cu-rec-eyebrow ${eyebrow}">${eyebrowTxt}</div>
          <div class="cu-rec-heading">${heading}</div>
          <div class="cu-rec-scroll">${recCards}</div>
        </div>
      `;
    }).join('');

    return `
      <div style="margin-bottom:26px;">
        <div class="cu-phase-header">${phaseLabel}</div>
        ${itemSections}
      </div>
    `;
  }).join('');

  const ratedCount = Object.keys(checkupState).length;
  const likedCount = Object.values(checkupState).filter(s => s.verdict === 'like').length;
  const heading = likedCount === ratedCount && ratedCount > 0
    ? "Last night's routine was firing. 🎉"
    : likedCount === 0
    ? "Fresh start. Let's find what works."
    : "Here's what we found.";

  return `
    <button class="back" onclick="goBack(routineCheckupHTML())">← Back</button>
    <div class="recs-header" style="margin-bottom:22px;">
      <div class="recs-title" style="color:#3FD5C0">${heading}</div>
      <div class="recs-sub">Preview anything that sounds good, then add it for tonight.</div>
    </div>
    ${sectionsHtml}
    <div class="done-card" style="margin-top:4px; margin-bottom:12px;">
      <div class="done-title">Updates saved to your routine</div>
      <div class="done-sub">We'll keep learning what works as you use it.</div>
    </div>
    <button class="save-btn" style="background:transparent; border:1.5px solid var(--border); color:var(--text-1); margin-top:0;" onclick="switchTab('plan')">Done → See your plan</button>
  `;
}

function previewRec(btn) {
  const isPlaying = btn.classList.contains('playing');
  document.querySelectorAll('.cu-rec-btn-eq.playing').forEach(b => {
    b.innerHTML = '▶ Preview'; b.classList.remove('playing');
  });
  if (!isPlaying) {
    btn.innerHTML = '⏸ Playing…'; btn.classList.add('playing');
  }
}
let _favs = []; // { title, img, tier }
let _planAdds = { Sleep: null, Unwind: [], 'Sunrise Alarm': null };

function favRec(btn, title, img, tier) {
  const saved = btn.classList.contains('saved');
  btn.innerHTML = saved ? '♡ Save' : '♥ Saved';
  btn.classList.toggle('saved', !saved);
  if (!saved) {
    if (!_favs.find(f => f.title === title)) _favs.push({ title, img, tier });
  } else {
    _favs = _favs.filter(f => f.title !== title);
  }
}
function addRec(btn, label, phase, title, img) {
  if (btn.classList.contains('added')) return;
  btn.textContent = '✓ Added';
  btn.classList.add('added');
  if (phase === 'Sleep') _planAdds.Sleep = { title, img };
  else if (phase === 'Unwind') _planAdds.Unwind.push({ title, img });
  else if (phase === 'Sunrise Alarm') _planAdds['Sunrise Alarm'] = { title, img };
}

let _recMode = 'swipe'; // 'list' or 'swipe'
let _recDeck = [];
let _recIdx = 0;
let _recDrag = null;
const REC_SWIPE_THRESH = 70;

function toggleRecMode() {
  _recMode = _recMode === 'list' ? 'swipe' : 'list';
  document.querySelectorAll('.debug-sw').forEach(s => s.classList.toggle('on', _recMode === 'swipe'));
  document.querySelectorAll('.debug-bar span').forEach((s, i) => {
    s.classList.toggle('active', (i === 0 && _recMode === 'list') || (i === 2 && _recMode === 'swipe'));
  });
}

function _buildRecDeck() {
  const deck = [];
  const phaseCTAs = { 'Sleep': '+ Add to Bedtime', 'Unwind': '+ Add to Bedtime Playlist', 'Sunrise Alarm': '+ Add to Alarm' };
  CHECKUP_ITEMS.forEach(item => {
    const state = checkupState[item.id];
    if (!state) return;
    const recs = computeRecs(item, state.verdict, state.chipTag || null);
    const isLike = state.verdict === 'like';
    const context = isLike
      ? `You liked <em>${item.title}</em> — here's what else might click`
      : `Instead of <em>${item.title}</em>${state.chip ? ` (${state.chip.toLowerCase()})` : ''}`;
    const eyebrow = isLike ? '✦ More like this' : 'Something different';
    const ctaLabel = phaseCTAs[item.phase] || '+ Add';
    recs.forEach(r => {
      deck.push({ ...r, context, eyebrow, ctaLabel, phaseLabel: item.phaseLabel, isLike });
    });
  });
  return deck;
}

function checkupRecsSwipeHTML() {

function _renderRecStack() {
  const stage = document.getElementById('rec-swipe-stage');
  if (!stage) return;
  stage.querySelectorAll('.rec-swipe-card').forEach(c => c.remove());

  if (_recIdx >= _recDeck.length) {

    if (!existing) {
      stage.innerHTML = `
        <div class="rec-swipe-done">
          <div class="rec-swipe-done-star">✦</div>
          <div class="rec-swipe-done-title">That's all for now</div>
          <div class="rec-swipe-done-sub">Head to the Library if you'd like to explore all 500+ options.</div>
        </div>
      `;

    if (btns) btns.style.display = 'none';
    _updateRecContext();

    return;
  }

  const visible = _recDeck.slice(_recIdx, _recIdx + 3);
  visible.forEach((r, i) => {
    const el = document.createElement('div');
    el.className = 'rec-swipe-card ' + (i === 0 ? 'is-top' : i === 1 ? 'is-next' : 'is-third');
    el.innerHTML = _recCardHTML(r);
    stage.appendChild(el);
  });

  _updateRecContext();
  _updateRecCounter();
}

const PHASE_EMOJI = { 'Bedtime': '🌙', 'Bedtime Playlist': '🎵', 'Rise Time': '☀️' };

function _updateRecContext() {
  const el = document.getElementById('rec-swipe-context');
  if (!el) return;
  const r = _recDeck[_recIdx];
  if (!r) { el.innerHTML = ''; return; }
