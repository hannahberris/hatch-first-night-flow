    <div class="rec-swipe-context">${r.context}</div>
  `;
}

function _updateRecCounter() {
  const el = document.getElementById('rec-swipe-counter');
  if (!el) return;
  if (_recIdx >= _recDeck.length) { el.innerHTML = ''; return; }
  el.textContent = `${_recIdx + 1} of ${_recDeck.length}`;
}

function _recSwipe(verdict) {
  const stage = document.getElementById('rec-swipe-stage');
  if (!stage || _recIdx >= _recDeck.length) return;
  const top = stage.querySelector('.is-top');
  if (!top) return;

  if (verdict === 'like') {
    const r = _recDeck[_recIdx];
    if (r && !_favs.find(f => f.title === r.title)) _favs.push({ title: r.title, img: r.img, tier: r.tier });
  }

  top.classList.add(verdict === 'like' ? 'fly-right' : 'fly-left');

  setTimeout(() => {
    _recIdx++;
    _renderRecStack();
    _initRecDrag();
  }, 370);
}

function _initRecDrag() {
  const stage = document.getElementById('rec-swipe-stage');
  if (!stage) return;
  const top = stage.querySelector('.rec-swipe-card.is-top');
  if (!top) return;

  function start(e) {
    if (e.target.closest('button')) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    _recDrag = { startX: x, dx: 0, card: top };
    top.classList.remove('snapping');
    top.style.transition = 'none';
  }
  function move(e) {
    if (!_recDrag) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    _recDrag.dx = x - _recDrag.startX;
    if (Math.abs(_recDrag.dx) < 4) return;
    if (e.cancelable) e.preventDefault();
    top.style.transform = `translateX(${_recDrag.dx}px) rotate(${_recDrag.dx * 0.055}deg)`;
    const likeOv = top.querySelector('.rec-swipe-ov-like');
    const nopeOv = top.querySelector('.rec-swipe-ov-nope');
    if (likeOv) likeOv.style.opacity = Math.min(1, Math.max(0, _recDrag.dx / REC_SWIPE_THRESH));
    if (nopeOv) nopeOv.style.opacity = Math.min(1, Math.max(0, -_recDrag.dx / REC_SWIPE_THRESH));
  }
  function end() {
    if (!_recDrag) return;
    const dx = _recDrag.dx;
    _recDrag = null;
    if (Math.abs(dx) >= REC_SWIPE_THRESH) {
      _recSwipe(dx > 0 ? 'like' : 'nope');
    } else {
      top.classList.add('snapping');
      top.style.transform = '';
      const likeOv = top.querySelector('.rec-swipe-ov-like');
      const nopeOv = top.querySelector('.rec-swipe-ov-nope');
      if (likeOv) likeOv.style.opacity = 0;
      if (nopeOv) nopeOv.style.opacity = 0;
    }
  }

  top.addEventListener('touchstart', start, { passive: true });
  top.addEventListener('touchmove', move, { passive: false });
  top.addEventListener('touchend', end);
  top.addEventListener('mousedown', start);
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', end, { once: true });
}

function _recPreview(btn) {
  const isPlaying = btn.classList.contains('playing');
  document.querySelectorAll('.rec-swipe-btn.playing').forEach(b => { b.innerHTML = '▶ Preview'; b.classList.remove('playing'); });
  if (!isPlaying) { btn.innerHTML = '⏸ Playing…'; btn.classList.add('playing'); }
}
function _recFav(btn, title, img, tier) {
  const saved = btn.classList.contains('saved');
  btn.innerHTML = saved ? '♡ Save' : '♥ Saved';
  btn.classList.toggle('saved', !saved);
  if (!saved) { if (!_favs.find(f => f.title === title)) _favs.push({ title, img, tier }); }
  else { _favs = _favs.filter(f => f.title !== title); }
}
function _recAdd(btn, label) {
  if (btn.classList.contains('added')) return;
  btn.textContent = '✓ Added';
  btn.classList.add('added');
  const r = _recDeck[_recIdx];
  if (r) {
    if (r.phase === 'Sleep') _planAdds.Sleep = { title: r.title, img: r.img };
    else if (r.phase === 'Unwind') _planAdds.Unwind.push({ title: r.title, img: r.img });
    else if (r.phase === 'Sunrise Alarm') _planAdds['Sunrise Alarm'] = { title: r.title, img: r.img };
  }
  setTimeout(() => _recSwipe('like'), 400);
}

// ── GUIDANCE PAGE — Q2 + recommendation + customization on one screen ─────────

function guidancePageHTML() {
  const cfg = Q2[S.q1];
  const optsHtml = cfg.opts.map((o, i) =>
    `<button class="opt q2-opt" id="q2opt-${i}" onclick="pickQ2('${o.b}', ${i})">
       <span class="opt-ico">${o.e}</span>${o.t}
     </button>`
  ).join('');
  return `
    <button class="back" onclick="goBack(sleepTabHTML())">← Back</button>
    <div class="q-header">
      <div class="q-title">${cfg.q}</div>
      <div class="q-subtitle">${cfg.sub}</div>
    </div>
    <div class="opts" id="q2-opts">${optsHtml}</div>
    <div id="rec-section"></div>
  `;
}

function pickQ2(branch, selectedIdx) {
  S.branch = branch;
  // Highlight selected, dim others, lock all
  document.querySelectorAll('.q2-opt').forEach((btn, i) => {
    btn.classList.add(i === selectedIdx ? 'q2-selected' : 'q2-dimmed');
    btn.disabled = true;
  });
  // Inject recommendation in-place
  const recEl = document.getElementById('rec-section');
  recEl.innerHTML = recContentHTML(branch);
  setTimeout(() => {
    recEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    if (branch === 'bedtime') initBedtimePicker();
    if (branch === 'alarm') setTimeout(() => showAlarmCategory(getAlarmRec(), true), 150);
  }, 80);
}

function recContentHTML(branch) {
  const br = BRANCHES[branch];
  return `
    <div class="rec-reveal">
      <div class="guide-card" style="background:${br.bg}; border-color:${br.border};">
        <div class="guide-icon">${br.icon}</div>
        <div class="guide-headline">${br.headline}</div>
        <div class="guide-body">${br.guide}</div>
      </div>
      ${customizationHTML(br.customization, br.color)}
      <button class="save-btn" style="background:${br.color};" onclick="saveRoutine(this)">
        Save to my routine →
      </button>
    </div>
  `;
}

// ── CUSTOMIZATION PANELS ──────────────────────────────────────────────────────

function soundCarouselHTML(sounds, prefix, color) {
  return sounds.map((s, i) => `
    <div class="sound-card" id="${prefix}-${i}" onclick="selectSound('${prefix}', ${i}, '${color}')">
      <div class="s-ico">${s.e}</div>
      <div class="s-name">${s.n}</div>
      <div class="s-wave"><span></span><span></span><span></span><span></span><span></span></div>
    </div>
  `).join('');
}

function segGroup(id, options, activeIdx) {
  return `<div class="btn-group" id="${id}">
    ${options.map((v, i) =>
      `<button class="seg-btn${i === activeIdx ? ' active' : ''}" onclick="selectSeg('${id}', this)">${v}</button>`
    ).join('')}
  </div>`;
}

function customizationHTML(type, color) {
  if (type === 'alarm') return `
    <div class="customize-section">
      <div class="cust-title">Let's dial it in</div>
      <div class="cust-label">Sunrise duration</div>
      ${segGroup('duration-group', ['10 min','15 min','20 min','30 min','45 min'], 2)}
      <div class="cust-label">Sunrise brightness</div>
      ${segGroup('brightness-group', ['Low','Medium','High'], 1)}
      <div class="cust-label" style="margin-top:20px">What kind of alarm do you want?</div>
      <div class="alarm-cats">
        ${Object.entries(ALARM_CATS).map(([key, cat]) => {
          const isRec = key === getAlarmRec();
          return `<button class="alarm-cat-btn${isRec ? ' active' : ''}" data-cat="${key}" onclick="showAlarmCategory('${key}', ${isRec})">
            ${cat.emoji} ${cat.label}${isRec ? '<span class="for-you-chip">✦ For you</span>' : ''}
          </button>`;
        }).join('')}
      </div>
      <div class="alarm-feed-wrap" id="alarm-feed-container"></div>
    </div>`;

  if (type === 'bedtime') {
    const mins = [5,10,15,20,25,30,35,40,45,50,55,60];
    const items = mins.map((m,i) =>
      `<div class="picker-item" onclick="pickerTap(${i})">${m} min</div>`
    ).join('');
    return `
    <div class="customize-section">
      <div class="cust-title">Set your bedtime reminders</div>
      <div class="cust-label">Remind me</div>
      <div class="picker-wrap">
        <div class="picker-highlight"></div>
        <div class="picker-mask"></div>
        <div class="picker-scroll" id="bedtime-picker">${items}</div>
      </div>
      <div class="picker-sublabel" id="picker-label">30 minutes before your target bedtime</div>
      <div class="cust-label">Bedtime support</div>
      <div class="toggle-card">
        <div class="toggle-left">
          <div class="toggle-ico">🕯️</div>
          <div>
            <div class="toggle-name">Turndown Service</div>
            <div class="toggle-desc">Sound and light ease you in — your room starts glowing as a cue that it's time to start getting ready for bed.</div>
          </div>
        </div>
        <div class="toggle-sw on" onclick="toggleSw(this)"><div class="toggle-k"></div></div>
      </div>
      <div class="toggle-card">
        <div class="toggle-left">
          <div class="toggle-ico">📱</div>
          <div>
            <div class="toggle-name">Bedtime Countdown</div>
            <div class="toggle-desc">A live activity on your lock screen keeps bedtime top of mind — and lets you know when it's time to tuck your phone in.</div>
          </div>
        </div>
        <div class="toggle-sw" onclick="toggleSw(this)"><div class="toggle-k"></div></div>
      </div>
    </div>`
  }

  if (type === 'winddown') return `
    <div class="customize-section">
      <div class="cust-title">Let's build your routine</div>
      <div class="cust-label">Start winding down</div>
      ${segGroup('winddown-group', ['20 min before bed','30 min before bed','45 min before bed'], 1)}
      <div class="cust-label">What do you want to wind down with?</div>
      <div class="sound-scroll">${soundCarouselHTML(SOUNDS_WIND, 'wind', color)}</div>
    </div>`;

  return `
    <div class="customize-section">
      <div class="cust-title">Let's find your sound</div>
      <div class="cust-label">Pick a sleep sound</div>
      <div class="sound-scroll">${soundCarouselHTML(SOUNDS_SLEEP, 'sleep', color)}</div>
      <div class="cust-label">Volume</div>
      ${segGroup('volume-group', ['Low','Medium','High'], 1)}
    </div>`;
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────

function selectSeg(groupId, btn) {
  document.querySelectorAll(`#${groupId} .seg-btn`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function selectSound(prefix, idx, color) {
  document.querySelectorAll(`[id^="${prefix}-"]`).forEach(card => {
    card.classList.remove('playing');
    card.style.borderColor = '';
    card.style.background  = '';
    card.querySelector('.s-wave').style.color = '';
  });
  const card = document.getElementById(`${prefix}-${idx}`);
  card.classList.add('playing');
  card.style.borderColor = color;
  card.style.background  = hexRgba(color, 0.12);
  card.querySelector('.s-wave').style.color = color;
}

function saveRoutine(btn) {
  btn.textContent = '✓ Saved to your routine';
  btn.style.background = '#3FD5C0';
  btn.disabled = true;
  const done = document.createElement('div');
  done.className = 'done-card';
  done.style.marginTop = '12px';
  done.innerHTML = `
    <div class="done-title">🎉 Your routine is taking shape</div>
    <div class="done-sub">Check back tomorrow morning — we'll celebrate what you built and keep adding from there.</div>
  `;
  btn.insertAdjacentElement('afterend', done);
  setTimeout(() => done.scrollIntoView({ behavior: 'smooth', block: 'center' }), 80);
}

// ── ALARM CARD FEED ───────────────────────────────────────────────────────────

let alarmFeedIdx = 0;

function getAlarmRec() {
  return (S.q1 === 'great' || S.q1 === 'okay') ? 'musical' : 'nature';
}

function showAlarmCategory(key, isRec = false) {
  document.querySelectorAll('.alarm-cat-btn').forEach(b => {
    const bRec = b.dataset.cat === getAlarmRec();
    b.classList.toggle('active', b.dataset.cat === key);
    // keep the for-you chip visible regardless of active state
    if (bRec && !b.querySelector('.for-you-chip')) {
      b.innerHTML += '<span class="for-you-chip">✦ For you</span>';
    }
  });

  let cards = ALARM_CATS[key].cards;
  if (key === 'surprise') {
    const all = Object.values(ALARM_CATS).flatMap(c => c.cards);
    cards = [all[Math.floor(Math.random() * all.length)]];
  }

  alarmFeedIdx = 0;
  const wrap = document.getElementById('alarm-feed-container');
  wrap.innerHTML = alarmCardFeedHTML(cards, isRec);
  renderSideDots(cards.length, 0);

  const feed = document.getElementById('alarm-feed');
  feed.addEventListener('scroll', () => {
    alarmFeedIdx = Math.round(feed.scrollTop / 300);
    renderSideDots(cards.length, alarmFeedIdx);
  }, { passive: true });
}

function alarmCardFeedHTML(cards, isRec = false) {
  const cardsHtml = cards.map((card, i) => `
    <div class="alarm-card" style="background:${card.grad}">
      <div class="ac-art">${card.art}</div>
      <div class="ac-overlay"></div>
      ${i === 0 && isRec ? '<div class="card-rec-tag">✦ Top pick for you</div>' : ''}
      <div class="ac-side-dots" id="side-dots"></div>
      <div class="ac-content">
        <div class="ac-top">
          <div class="ac-name">${card.name}</div>
          <button class="ac-play" onclick="previewAlarm(this)">▶</button>
        </div>
        <div class="ac-paired">
          <div class="ac-paired-dot"></div>Paired with ${card.paired}
        </div>
        <div class="ac-desc-row">
          <div class="ac-desc">${card.desc}</div>
          <button class="ac-heart" onclick="toggleHeart(this)">♡</button>
        </div>
      </div>
    </div>
  `).join('');

  return `
    <div class="alarm-feed" id="alarm-feed">${cardsHtml}</div>
    <button class="alarm-select-btn visible" onclick="confirmAlarm(this)">Select →</button>
  `;
}

function renderSideDots(total, active) {
  document.querySelectorAll('.ac-side-dots').forEach(el => {
    el.innerHTML = Array.from({length: total}, (_, i) =>
      `<div class="ac-side-dot${i === active ? ' active' : ''}"></div>`
    ).join('');
  });
}

function previewAlarm(btn) {
  const wasPlaying = btn.classList.contains('playing');
  document.querySelectorAll('.ac-play').forEach(b => {
    b.classList.remove('playing');
    b.textContent = '▶';
  });
  if (!wasPlaying) {
    btn.classList.add('playing');
    btn.textContent = '■';
  }
}

function toggleHeart(btn) {
  btn.classList.toggle('liked');
  btn.textContent = btn.classList.contains('liked') ? '♥' : '♡';
}

function confirmAlarm(btn) {
  btn.textContent = '✓ Added to your routine';
  btn.classList.add('selected');
  btn.disabled = true;
}

// ── PICKER + TOGGLES ─────────────────────────────────────────────────────────

const PICKER_MINS = [5,10,15,20,25,30,35,40,45,50,55,60];
const PICKER_H    = 44;

function initBedtimePicker() {
  const scroll = document.getElementById('bedtime-picker');
  if (!scroll) return;
  scroll.scrollTop = 5 * PICKER_H; // default: 30 min

  function update() {
    const idx = Math.max(0, Math.min(PICKER_MINS.length - 1, Math.round(scroll.scrollTop / PICKER_H)));
    document.querySelectorAll('.picker-item').forEach((el, i) => el.classList.toggle('selected', i === idx));
    const lbl = document.getElementById('picker-label');
    if (lbl) lbl.textContent = `${PICKER_MINS[idx]} minutes before your target bedtime`;
  }

  scroll.addEventListener('scroll', update, { passive: true });
  update();
}

function pickerTap(idx) {
  const scroll = document.getElementById('bedtime-picker');
  if (scroll) scroll.scrollTo({ top: idx * PICKER_H, behavior: 'smooth' });
}

function toggleSw(el) { el.classList.toggle('on'); }

// ── INIT ──────────────────────────────────────────────────────────────────────

const c = document.getElementById('content');
const init = document.createElement('div');
init.className = 'screen slide-in';
init.innerHTML = sleepTabHTML();
c.appendChild(init);
</script>
</body>
</html>
